{% extends 'base.html' %}
{% block title %}Student Login{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">👨‍🎓</div>
      <h2>Student Portal</h2>
      <p>Enter your credentials to access your dashboard</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Roll Number</label>
        <input class="form-control" type="text" name="roll_number" placeholder="e.g. C5-001" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;margin-top:0.5rem;">Login →</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem;">
      <p style="font-size:0.82rem;color:var(--muted);">Demo: Roll <strong>C5-001</strong> / Password <strong>student123</strong></p>
      <br>
      <a href="/" style="color:var(--navy);font-size:0.85rem;">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
