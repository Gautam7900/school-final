{% extends 'base.html' %} {% block content %}

<div class="dashboard">
  <div class="dash-main" style="max-width: 900px">
    <div class="dash-card">
      <div class="dash-card-header">
        <h3>👨‍🎓 Student Profile</h3>
      </div>

      <div class="dash-card-body">
        <div style="text-align: center; margin-bottom: 30px">
          {% if student['photo'] %}

          <img
            src="/static/uploads/students/{{ student['photo'] }}"
            class="student-photo"
          />

          {% else %}

          <div class="student-avatar">{{ student['name'][0] }}</div>

          {% endif %}

          <div
            style="
              width: 150px;
              height: 150px;
              border-radius: 50%;
              background: #d4af37;
              color: #081c4b;
              font-size: 3rem;
              font-weight: 700;
              display: flex;
              align-items: center;
              justify-content: center;
              margin: auto;
            "
          >
            {{ student['name'][0] }}
          </div>

          {% endif %}
        </div>

        <form
          method="POST"
          action="/student/update_profile/{{ student['id'] }}"
          enctype="multipart/form-data"
        >
          <div class="form-group">
            <label>Profile Photo</label>
            <input type="file" name="photo" class="form-control" />
          </div>

          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              name="name"
              value="{{ student['name'] }}"
              class="form-control"
            />
          </div>

          <div class="form-group">
            <label>Aadhaar Number</label>
            <input
              type="text"
              name="aadhaar"
              value="{{ student['aadhaar'] }}"
              class="form-control"
            />
          </div>

          <div class="form-group">
            <label>Address</label>
            <textarea name="address" class="form-control">
{{ student['address'] }}</textarea
            >
          </div>

          <button type="submit" class="btn btn-gold">💾 Save Profile</button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
