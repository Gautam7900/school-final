{% extends 'base.html' %} {% block content %}

<style>
  .profile-wrapper {
    max-width: 900px;
    margin: auto;
  }

  .profile-card {
    background: white;
    border-radius: 20px;
    padding: 40px;

    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .profile-top {
    text-align: center;
    margin-bottom: 40px;
  }

  .student-photo {
    width: 160px;
    height: 160px;

    border-radius: 50%;

    object-fit: cover;

    border: 6px solid #d4af37;

    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);

    cursor: pointer;

    transition: 0.3s;
  }

  .student-photo:hover {
    transform: scale(1.05);
  }

  .student-avatar {
    width: 160px;
    height: 160px;

    border-radius: 50%;

    background: #d4af37;

    color: #081c4b;

    font-size: 4rem;

    font-weight: 700;

    display: flex;

    align-items: center;

    justify-content: center;

    margin: auto;

    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
  }

  .profile-name {
    margin-top: 20px;

    font-size: 2rem;

    font-weight: 700;

    color: #081c4b;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-control {
    width: 100%;

    padding: 14px;

    border-radius: 10px;

    border: 1px solid #ddd;

    font-size: 16px;
  }

  .btn-save {
    background: #081c4b;

    color: white;

    border: none;

    padding: 14px 30px;

    border-radius: 10px;

    font-size: 16px;

    font-weight: 700;

    cursor: pointer;
  }

  .btn-save:hover {
    background: #0c2c73;
  }
</style>

<div class="dashboard">
  <div class="profile-wrapper">
    <div class="profile-card">
        <div class="profile-top">
         {% if student['photo'] %}

         <img
           src="/static/uploads/students/{{ student['photo'] }}"
           class="student-photo"
         />

         {% else %}

         <div class="student-avatar">{{ student['name'][0] }}</div>

         {% endif %}

          <div class="profile-name">{{ student['name'] }}</div>
        </div>

      <form
        method="POST"
        action="/student/update_profile/{{ student['id'] }}"
        enctype="multipart/form-data"
      >
        <div class="form-group">
          <label>Profile Photo</label>

          <input type="file" name="photo" class="form-control" />
        </div>

        <div class="form-group">
          <label>Full Name</label>

          <input
            type="text"
            name="name"
            value="{{ student['name'] }}"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label>Aadhaar Number</label>

          <input
            type="text"
            name="aadhaar"
            value="{{ student['aadhaar'] }}"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label>Address</label>

          <textarea name="address" class="form-control" rows="4">
{{ student['address'] }}</textarea
          >
        </div>

        <button type="submit" class="btn-save">💾 Save Profile</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
