{% extends 'base.html' %}

{% block content %}

<style>

.edit-page{
    max-width:800px;
    margin:auto;
    padding:40px 20px;
}

.edit-card{
    background:#fff;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.form-group{
    margin-bottom:20px;
}

.form-control{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
}

.save-btn{
    background:#081c4b;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

</style>

<div class="edit-page">

    <div class="edit-card">

        <h2 style="margin-bottom:30px;">
            ✏️ Edit Profile
        </h2>

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="form-group">
                <label>Profile Photo</label>

                <input
                    type="file"
                    name="photo"
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label>Full Name</label>

                <input
                    type="text"
                    name="name"
                    value="{{ student['name'] }}"
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label>Parent Name</label>

                <input
                    type="text"
                    name="parent_name"
                    value="{{ student['parent_name'] }}"
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label>Contact</label>

                <input
                    type="text"
                    name="contact"
                    value="{{ student['contact'] }}"
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label>Aadhaar</label>

                <input
                    type="text"
                    name="aadhaar"
                    value="{{ student['aadhaar'] }}"
                    class="form-control"
                >
            </div>

            <div class="form-group">
                <label>Address</label>

                <textarea
                    name="address"
                    class="form-control"
                    rows="4"
                >{{ student['address'] }}</textarea>
            </div>

            <button
                type="submit"
                class="save-btn"
            >
                💾 Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
