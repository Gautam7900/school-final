{% extends 'base.html' %} {% block title %}Edit Student Profile{% endblock %} {%
block content %}

<style>
  .student-edit-page {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
  }

  .student-edit-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 30px;
  }

  .student-photo-card,
  .student-form-card {
    background: white;
    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    overflow: hidden;
  }

  .card-header {
    background: #081c4b;
    color: white;
    padding: 20px 25px;
  }

  .card-header h3 {
    margin: 0;
  }

  .card-body {
    padding: 30px;
  }

  .student-photo {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
    border: 6px solid #d4af37;
    display: block;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  }

  .student-avatar {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: #d4af37;
    color: #081c4b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    font-weight: 700;
    margin: auto;
  }

  .upload-box {
    margin-top: 25px;
    border: 2px dashed #d4af37;
    border-radius: 14px;
    padding: 25px;
    text-align: center;
    cursor: pointer;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #081c4b;
  }

  .form-control {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 15px;
  }

  textarea.form-control {
    min-height: 120px;
  }

  .btn-save {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: #081c4b;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .btn-save:hover {
    background: #12398a;
  }

  .btn-outline {
    display: inline-block;
    padding: 10px 18px;
    border: 2px solid #081c4b;
    border-radius: 10px;
    color: #081c4b;
    text-decoration: none;
    font-weight: 700;
    margin-bottom: 20px;
  }

  @media (max-width: 900px) {
    .student-edit-layout {
      grid-template-columns: 1fr;
    }

    .form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="student-edit-page">
  <a href="/student/dashboard" class="btn-outline"> ← Dashboard </a>

  <form
    method="POST"
    action="/student/update_profile/{{ student['id'] }}"
    enctype="multipart/form-data"
  >
    <div class="student-edit-layout">
      <!-- LEFT -->

      <div class="student-photo-card">
        <div class="card-header">
          <h3>📷 Profile Photo</h3>
        </div>

        <div class="card-body">
          <div id="photoPreview">
            {% if student['photo'] %}

            <img
              src="{{ url_for('static', filename='uploads/students/' + student['photo']) }}"
              class="profile-photo"
            />

            {% else %}

            <div class="profile-avatar">{{ student['name'][0] }}</div>

            {% endif %}
          </div>

          <label>
            <div class="upload-box">
              <div style="font-size: 40px">📁</div>

              <h4>Choose Student Photo</h4>
            </div>

            <input
              type="file"
              name="photo"
              id="photoInput"
              accept="image/*"
              style="display: none"
              onchange="previewPhoto(this)"
            />
          </label>
        </div>
      </div>

      <!-- RIGHT -->

      <div class="student-form-card">
        <div class="card-header">
          <h3>✏️ Edit Student Information</h3>
        </div>

        <div class="card-body">
          <div class="form-grid">
            <div class="form-group">
              <label>Student Name</label>

              <input
                type="text"
                name="name"
                value="{{ student['name'] }}"
                class="form-control"
              />
            </div>

            <div class="form-group">
              <label>Parent Name</label>

              <input
                type="text"
                name="parent_name"
                value="{{ student['parent_name'] }}"
                class="form-control"
              />
            </div>

            <div class="form-group">
              <label>Contact</label>

              <input
                type="text"
                name="contact"
                value="{{ student['contact'] }}"
                class="form-control"
              />
            </div>

            <div class="form-group">
              <label>Aadhaar</label>

              <input
                type="text"
                name="aadhaar"
                value="{{ student['aadhaar'] }}"
                class="form-control"
              />
            </div>

            <div class="form-group">
              <label>Class</label>

              <input
                type="text"
                name="class_name"
                value="{{ student['class_name'] }}"
                class="form-control"
              />
            </div>

            <div class="form-group">
              <label>Roll Number</label>

              <input
                type="text"
                name="roll_number"
                value="{{ student['roll_number'] }}"
                class="form-control"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Address</label>

            <textarea name="address" class="form-control">
{{ student['address'] }}</textarea
            >
          </div>

          <button type="submit" class="btn-save">
            💾 Save Student Profile
          </button>
        </div>
      </div>
    </div>
  </form>
</div>

<script>
  function previewPhoto(input) {
    const file = input.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
      const preview = document.getElementById("previewImg");

      if (preview.tagName === "IMG") {
        preview.src = e.target.result;
      } else {
        const img = document.createElement("img");

        img.src = e.target.result;

        img.id = "previewImg";

        img.className = "student-photo";

        preview.parentNode.replaceChild(img, preview);
      }
    };

    reader.readAsDataURL(file);
  }
</script>

{% endblock %}
