{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">⚙️</div>
      <h2>Admin Panel</h2>
      <p>Restricted access — authorized personnel only</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Admin Username</label>
        <input class="form-control" type="text" name="username" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter admin password" required>
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%;margin-top:0.5rem;">Login →</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem;">
      <p style="font-size:0.82rem;color:var(--muted);">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
      <br>
      <a href="/" style="color:var(--navy);font-size:0.85rem;">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
