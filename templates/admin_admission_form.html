<!doctype html>
<html>
  <head>
    <title>Complete Admission</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body class="dash-body">
    <div
      class="container"
      style="max-width: 1100px; margin: auto; padding: 40px"
    >
      <div class="dash-card">
        <div class="dash-card-header">
          <h2>🎓 Complete Student Admission</h2>
        </div>

        <div class="dash-card-body">
          <form
            method="POST"
            action="/admin/complete-admission/{{ admission['id'] }}"
          >
            <div class="form-row">
              <div class="form-group">
                <label>Student Name</label>

                <input
                  type="text"
                  name="name"
                  class="form-control"
                  value="{{ admission['name'] }}"
                  required
                />
              </div>

              <div class="form-group">
                <label>Date of Birth</label>

                <input
                  type="text"
                  name="dob"
                  class="form-control"
                  value="{{ admission['dob'] }}"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Gender</label>

                <input
                  type="text"
                  name="gender"
                  class="form-control"
                  value="{{ admission['gender'] }}"
                />
              </div>

              <div class="form-group">
                <label>Class</label>

                <input
                  type="text"
                  name="class_name"
                  class="form-control"
                  value="{{ admission['class_name'] }}"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Father Name</label>

                <input
                  type="text"
                  name="father_name"
                  class="form-control"
                  value="{{ admission['father_name'] }}"
                />
              </div>

              <div class="form-group">
                <label>Mother Name</label>

                <input
                  type="text"
                  name="mother_name"
                  class="form-control"
                  value="{{ admission['mother_name'] }}"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Contact</label>

                <input
                  type="text"
                  name="contact"
                  class="form-control"
                  value="{{ admission['contact'] }}"
                />
              </div>

              <div class="form-group">
                <label>Email</label>

                <input
                  type="email"
                  name="email"
                  class="form-control"
                  value="{{ admission['email'] }}"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Address</label>

                <textarea name="address" class="form-control">
{{ admission['address'] }}</textarea
                >
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Student Login Password</label>

                <input
                  type="text"
                  name="password"
                  class="form-control"
                  required
                />
              </div>
            </div>

            <button type="submit" class="btn btn-navy">
              ✅ Finalize Admission
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
