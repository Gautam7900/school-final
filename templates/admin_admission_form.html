<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Admission Form</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        .admission-page{
            background:#f7f4ed;
            min-height:100vh;
            padding:40px 20px;
        }

        .admission-container{
            max-width:1200px;
            margin:auto;
        }

        .admission-card{
            background:#fff;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
        }

        .admission-header{
            background:linear-gradient(135deg,#081c4b,#123b8f);
            padding:40px;
            color:#fff;
            text-align:center;
        }

        .admission-header h1{
            font-size:3rem;
            margin-bottom:10px;
        }

        .admission-header p{
            opacity:0.9;
            font-size:1.1rem;
        }

        .form-section{
            padding:40px;
            border-bottom:1px solid #eee;
        }

        .section-title{
            color:#081c4b;
            font-size:1.4rem;
            margin-bottom:25px;
            font-weight:700;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:25px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        .form-group label{
            margin-bottom:8px;
            font-weight:700;
            color:#081c4b;
        }

        .form-control{
            padding:14px 16px;
            border:1px solid #d8d8d8;
            border-radius:12px;
            font-size:1rem;
            background:#fafafa;
            transition:0.3s;
        }

        .form-control:focus{
            border-color:#123b8f;
            background:#fff;
            outline:none;
            box-shadow:0 0 0 3px rgba(18,59,143,0.1);
        }

        textarea.form-control{
            min-height:120px;
            resize:vertical;
        }

        .submit-area{
            padding:40px;
            text-align:center;
            background:#fafafa;
        }

        .submit-btn{
            background:linear-gradient(135deg,#081c4b,#123b8f);
            color:#fff;
            border:none;
            padding:18px 50px;
            border-radius:14px;
            font-size:1.1rem;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .submit-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        @media(max-width:768px){

            .admission-header h1{
                font-size:2rem;
            }

            .form-section{
                padding:25px;
            }

        }

    </style>

</head>

<body>

<div class="admission-page">

    <div class="admission-container">

        <div class="admission-card">

            <div class="admission-header">

                <h1>🎓 Student Admission Form</h1>

                <p>
                    BrightMind School • Session 2025-26
                </p>

            </div>

            <form method="POST"
                  action="/submit_admission">

                <!-- STUDENT DETAILS -->

                <div class="form-section">

                    <div class="section-title">
                        👨‍🎓 Student Information
                    </div>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Student Full Name</label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date"
                                   name="dob"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Gender</label>
                            <select name="gender"
                                    class="form-control"
                                    required>

                                <option value="">Select</option>
                                <option>Male</option>
                                <option>Female</option>
                                <option>Other</option>

                            </select>
                        </div>

                        <div class="form-group">
                            <label>Admission Class</label>

                            <select name="class_name"
                                    class="form-control"
                                    required>

                                <option value="">Select Class</option>

                                <option>UKG</option>

                                {% for i in range(1,11) %}
                                <option>Class {{ i }}</option>
                                {% endfor %}

                            </select>

                        </div>

                        <div class="form-group">
                            <label>Blood Group</label>

                            <select name="blood_group"
                                    class="form-control">

                                <option>A+</option>
                                <option>A-</option>
                                <option>B+</option>
                                <option>B-</option>
                                <option>AB+</option>
                                <option>AB-</option>
                                <option>O+</option>
                                <option>O-</option>

                            </select>

                        </div>

                        <div class="form-group">
                            <label>Religion</label>

                            <input type="text"
                                   name="religion"
                                   class="form-control">

                        </div>

                    </div>

                </div>

                <!-- PARENT DETAILS -->

                <div class="form-section">

                    <div class="section-title">
                        👨‍👩‍👧 Parent / Guardian Details
                    </div>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Father Name</label>

                            <input type="text"
                                   name="father_name"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Mother Name</label>

                            <input type="text"
                                   name="mother_name"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Parent Contact</label>

                            <input type="text"
                                   name="contact"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>

                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="form-group">
                            <label>Occupation</label>

                            <input type="text"
                                   name="occupation"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Annual Income</label>

                            <input type="text"
                                   name="income"
                                   class="form-control">
                        </div>

                    </div>

                </div>

                <!-- ADDRESS -->

                <div class="form-section">

                    <div class="section-title">
                        🏠 Address Information
                    </div>

                    <div class="form-grid">

                        <div class="form-group"
                             style="grid-column:1/-1;">

                            <label>Full Address</label>

                            <textarea name="address"
                                      class="form-control"></textarea>

                        </div>

                        <div class="form-group">
                            <label>City</label>

                            <input type="text"
                                   name="city"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>State</label>

                            <input type="text"
                                   name="state"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Pincode</label>

                            <input type="text"
                                   name="pincode"
                                   class="form-control">
                        </div>

                    </div>

                </div>

                <!-- ACADEMIC -->

                <div class="form-section">

                    <div class="section-title">
                        📚 Previous Academic Information
                    </div>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Previous School</label>

                            <input type="text"
                                   name="previous_school"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Last Class Passed</label>

                            <input type="text"
                                   name="last_class"
                                   class="form-control">
                        </div>

                        <div class="form-group">
                            <label>Percentage / Grade</label>

                            <input type="text"
                                   name="percentage"
                                   class="form-control">
                        </div>

                    </div>

                </div>

                <!-- MEDICAL -->

                <div class="form-section">

                    <div class="section-title">
                        🏥 Medical Information
                    </div>

                    <div class="form-grid">

                        <div class="form-group">
                            <label>Medical Conditions</label>

                            <textarea name="medical"
                                      class="form-control"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Emergency Contact</label>

                            <input type="text"
                                   name="emergency_contact"
                                   class="form-control">
                        </div>

                    </div>

                </div>

                <!-- SUBMIT -->

                <div class="submit-area">

                    <button type="submit"
                            class="submit-btn">

                        ✅ Submit Admission Form

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
