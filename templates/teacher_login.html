{% extends 'base.html' %}
{% block title %}Teacher Login{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-circle">👩‍🏫</div>
      <h2>Teacher Portal</h2>
      <p>Login to manage your class activities</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input class="form-control" type="text" name="username" placeholder="e.g. priya" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-navy" style="width:100%;margin-top:0.5rem;">Login →</button>
    </form>
    <div style="text-align:center;margin-top:1.5rem;">
      <p style="font-size:0.82rem;color:var(--muted);">Demo: Username <strong>priya</strong> / Password <strong>teacher123</strong></p>
      <br>
      <a href="/" style="color:var(--navy);font-size:0.85rem;">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
